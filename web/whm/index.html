<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
  /* Palette from the data-viz reference (status colors validated; blue single-series). */
  :root{
    color-scheme: light dark;
    --page:#f9f9f7; --surface:#fcfcfb; --line:#e1e0d9; --ring:rgba(11,11,11,.10);
    --ink:#0b0b0b; --ink2:#52514e; --muted:#898781;
    --accent:#2a78d6; --grid:#e1e0d9; --axis:#c3c2b7;
    --good:#0ca30c; --warning:#fab219; --serious:#ec835a; --critical:#d03b3b;
  }
  @media (prefers-color-scheme:dark){:root:where(:not([data-theme="light"])){
    --page:#0d0d0d; --surface:#1a1a19; --line:#2c2c2a; --ring:rgba(255,255,255,.10);
    --ink:#fff; --ink2:#c3c2b7; --muted:#898781;
    --accent:#3987e5; --grid:#2c2c2a; --axis:#383835;
  }}
  :root[data-theme="dark"]{
    --page:#0d0d0d; --surface:#1a1a19; --line:#2c2c2a; --ring:rgba(255,255,255,.10);
    --ink:#fff; --ink2:#c3c2b7; --muted:#898781;
    --accent:#3987e5; --grid:#2c2c2a; --axis:#383835;
  }
  *{box-sizing:border-box}
  body{font:14px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif;margin:0;background:var(--page);color:var(--ink)}
  header{display:flex;align-items:center;gap:.7rem;padding:1rem 1.25rem;border-bottom:1px solid var(--line);background:var(--surface)}
  .logo{width:32px;height:32px;border-radius:8px;background:var(--accent);color:#fff;display:grid;place-items:center;font-weight:700}
  header h1{font-size:1.05rem;margin:0}
  header .meta{margin-left:auto;color:var(--muted);font-size:.8rem}
  nav.tabs{display:flex;gap:.25rem;padding:.5rem 1rem 0;border-bottom:1px solid var(--line);background:var(--surface)}
  nav.tabs button{font:inherit;border:0;background:none;color:var(--ink2);padding:.55rem .9rem;border-radius:8px 8px 0 0;cursor:pointer;border-bottom:2px solid transparent}
  nav.tabs button[aria-selected="true"]{color:var(--ink);border-bottom-color:var(--accent);font-weight:600}
  main{max-width:64rem;margin:0 auto;padding:1.25rem}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:1rem 1.15rem;margin-bottom:1rem}
  .card h2{font-size:.95rem;margin:0 0 .75rem}
  .tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(9rem,1fr));gap:.75rem}
  .tile{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:.8rem .9rem}
  .tile .lbl{display:flex;align-items:center;gap:.4rem;color:var(--ink2);font-size:.8rem}
  .tile .dot{width:9px;height:9px;border-radius:50%}
  .tile .val{font-size:1.7rem;font-weight:650;margin-top:.2rem;font-variant-numeric:tabular-nums}
  .row{display:flex;gap:1rem;flex-wrap:wrap}
  .row>.card{flex:1;min-width:18rem}
  .ctl{display:flex;gap:.5rem;align-items:center;margin-bottom:1rem}
  select,input,textarea,button.act{font:inherit;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:.4rem .6rem}
  button.act{background:var(--accent);color:#fff;border-color:transparent;cursor:pointer;font-weight:600}
  button.act:disabled{opacity:.5;cursor:default}
  label.field{display:grid;gap:.25rem;margin-bottom:.7rem;font-size:.82rem;color:var(--ink2)}
  label.field input,label.field select{width:100%}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 1.25rem}
  textarea{width:100%;min-height:14rem;font-family:ui-monospace,monospace;font-size:.82rem;resize:vertical}
  table{width:100%;border-collapse:collapse;font-size:.82rem}
  th,td{text-align:left;padding:.4rem .5rem;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--muted);font-weight:600}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .badge{display:inline-block;padding:.05rem .4rem;border-radius:999px;font-size:.72rem;color:#fff}
  .bars text{fill:var(--ink2)} .bars .axis{stroke:var(--axis)} .bars .grid{stroke:var(--grid)}
  .empty{color:var(--muted);padding:1.5rem 0;text-align:center}
  pre.log{background:var(--page);border:1px solid var(--line);border-radius:8px;padding:.6rem .8rem;font:.76rem/1.45 ui-monospace,monospace;max-height:24rem;overflow:auto;white-space:pre-wrap;word-break:break-all;margin:0}
  button.act.danger{background:var(--critical)}
  button.act.plain{background:var(--surface);color:var(--ink);border:1px solid var(--line);font-weight:500}
  .statline{display:flex;gap:1.2rem;flex-wrap:wrap;align-items:center;margin-bottom:.8rem}
  .statline .dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:.35rem}
  .toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--page);padding:.5rem 1rem;border-radius:8px;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
  .muted{color:var(--muted)}
</style></head>
<body>
  <header>
    <span class="logo">MS</span>
    <h1>MSFE-NG · MailScanner Front-End</h1>
    <span class="meta">{{VIEW}} · {{PANEL}} · v{{VERSION}}</span>
  </header>
  <nav class="tabs" id="tabs">
    <button data-tab="dash" aria-selected="true">Dashboard</button>
    <button data-tab="settings" aria-selected="false">Settings</button>
    <button data-tab="lists" aria-selected="false">Lists</button>
    <button data-tab="messages" aria-selected="false">Messages</button>
    <button data-tab="rules" aria-selected="false">Rules</button>
    <button data-tab="service" aria-selected="false">Service</button>
    <button data-tab="config" aria-selected="false">Config</button>
  </nav>
  <main id="view"></main>
  <div class="toast" id="toast"></div>

<script>
const PANEL="{{PANEL}}";
// Direct = served by the daemon in dev; else proxied through the panel CGI.
const DIRECT = !location.pathname.includes('.cgi') && !location.pathname.includes('CMD_PLUGINS');
async function api(path,{method='GET',body=null,raw=false}={}){
  const opts={method,headers:{}};
  if(body){opts.body=JSON.stringify(body);opts.headers['Content-Type']='application/json';}
  let url=path;
  if(!DIRECT){url=location.pathname.split('?')[0];opts.headers['X-MSFE-Path']=path;}
  const r=await fetch(url,opts);
  if(raw) return r.text();
  try{return await r.json();}catch(e){return {error:'bad response'};}
}
const $=(s,r=document)=>r.querySelector(s);
const el=(t,a={},...c)=>{const n=document.createElement(t);for(const k in a){if(k==='html')n.innerHTML=a[k];else n.setAttribute(k,a[k]);}c.flat().forEach(x=>n.append(x));return n;};
const esc=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

let policy=null; // {settings:{}, whitelist:[], blacklist:[]}
let days=7;

const tabs={dash:renderDash,settings:renderSettings,lists:renderLists,messages:renderMessages,rules:renderRules,service:renderService,config:renderConfig};
let logTimer=null; // maillog auto-refresh; cleared on every tab switch
$('#tabs').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  clearInterval(logTimer);logTimer=null;
  document.querySelectorAll('#tabs button').forEach(x=>x.setAttribute('aria-selected',x===b));
  tabs[b.dataset.tab]();
});

// ---- Dashboard --------------------------------------------------------------
async function renderDash(){
  const v=$('#view');v.innerHTML='';
  const ctl=el('div',{class:'ctl'},el('span',{class:'muted'},'Window: '));
  const sel=el('select');[7,30,90].forEach(d=>sel.append(el('option',{value:d,...(d===days?{selected:'selected'}:{})},d+' days')));
  sel.onchange=()=>{days=+sel.value;renderDash();};
  ctl.append(sel);v.append(ctl);

  const tiles=el('div',{class:'tiles'});v.append(tiles);
  const sum=await api('/api/stats/summary?days='+days);
  if(sum && sum.available){
    const spec=[['total','Total','var(--accent)'],['clean','Clean','var(--good)'],
      ['spam','Spam','var(--warning)'],['highspam','High spam','var(--serious)'],
      ['virus','Virus','var(--critical)'],['quarantined','Quarantined','var(--muted)']];
    spec.forEach(([k,lbl,c])=>tiles.append(el('div',{class:'tile'},
      el('div',{class:'lbl'},el('span',{class:'dot',style:'background:'+c}),lbl),
      el('div',{class:'val'},String(sum[k]??0)))));
  } else {
    tiles.append(el('div',{class:'empty',html:'No data yet. Configure the database (<code>msfe-ng db-migrate</code>) and enable logging (<code>msfe-ng mailscanner enable-logging</code>).'}));
  }

  const rowc=el('div',{class:'row'});v.append(rowc);
  const volCard=el('div',{class:'card'},el('h2',{},'Daily volume'));
  const topCard=el('div',{class:'card'},el('h2',{},'Top sender domains'));
  rowc.append(volCard,topCard);

  const ser=await api('/api/stats/series?days='+days);
  if(ser&&ser.available&&ser.points&&ser.points.length)
    volCard.append(barChart(ser.points.map(p=>({label:p.date.slice(5),value:p.total})),'var(--accent)'));
  else volCard.append(el('div',{class:'empty'},'No volume data.'));

  const top=await api('/api/stats/top?field=from_domain&days='+days+'&limit=8');
  if(top&&top.available&&top.items&&top.items.length)
    topCard.append(hbars(top.items.map(i=>({label:i.key,value:i.count}))));
  else topCard.append(el('div',{class:'empty'},'No sender data.'));
}

// vertical bar chart (single series) as inline SVG
function barChart(data,color){
  const W=Math.max(320,data.length*34),H=180,pad=24,bw=Math.min(26,(W-2*pad)/data.length-6);
  const max=Math.max(1,...data.map(d=>d.value));
  const svg=svgEl('svg',{viewBox:`0 0 ${W} ${H}`,class:'bars',width:'100%',height:H});
  svg.append(svgEl('line',{class:'axis',x1:pad,y1:H-pad,x2:W-4,y2:H-pad}));
  data.forEach((d,i)=>{
    const x=pad+i*((W-2*pad)/data.length)+3, h=(H-2*pad)*d.value/max, y=H-pad-h;
    const r=svgEl('rect',{x,y,width:bw,height:Math.max(1,h),rx:3,fill:color});
    r.append(svgEl('title',{},`${d.label}: ${d.value}`));svg.append(r);
    if(i%Math.ceil(data.length/8)===0) svg.append(svgEl('text',{x:x+bw/2,y:H-pad+12,'text-anchor':'middle','font-size':9},d.label));
  });
  return svg;
}
// horizontal bars (labeled categories)
function hbars(data){
  const max=Math.max(1,...data.map(d=>d.value));
  const wrap=el('div',{});
  data.forEach(d=>{
    const row=el('div',{style:'display:flex;align-items:center;gap:.5rem;margin:.25rem 0'});
    row.append(el('div',{style:'width:11rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap',class:'muted',title:d.label},d.label));
    const track=el('div',{style:'flex:1;background:var(--line);border-radius:4px;height:14px'});
    track.append(el('div',{style:`width:${100*d.value/max}%;background:var(--accent);height:100%;border-radius:4px`}));
    row.append(track,el('div',{class:'num',style:'width:3rem;text-align:right;font-variant-numeric:tabular-nums'},String(d.value)));
    wrap.append(row);
  });
  return wrap;
}
function svgEl(t,a={},...c){const n=document.createElementNS('http://www.w3.org/2000/svg',t);for(const k in a)n.setAttribute(k,a[k]);c.forEach(x=>n.append(x));return n;}

// ---- Settings ---------------------------------------------------------------
async function ensurePolicy(){ if(!policy) policy=await api('/api/policy'); policy.settings??={};policy.whitelist??=[];policy.blacklist??=[]; }
const SETTINGS_FIELDS=[
  ['highscore','High spam score','number'],
  ['lowscore','Low spam score','number'],
  ['def_spam','Scan for spam',['yes','no']],
  ['def_virus','Scan for viruses',['yes','no']],
  ['def_lspam','Low-spam action',['deliver','delete','spambox','forward']],
  ['def_hspam','High-spam action',['deliver','delete','spambox','forward']],
  ['def_dvirus','Deliver disinfected',['yes','no']],
  ['store','Store copies (quarantine)',['yes','no']],
];
async function renderSettings(){
  const v=$('#view');v.innerHTML='';await ensurePolicy();
  const card=el('div',{class:'card'},el('h2',{},'Global scanning policy'));
  const grid=el('div',{class:'grid2'});
  SETTINGS_FIELDS.forEach(([k,lbl,type])=>{
    const cur=policy.settings[k]??'';
    let input;
    if(Array.isArray(type)){input=el('select');type.forEach(o=>input.append(el('option',{value:o,...(o===cur?{selected:'selected'}:{})},o)));}
    else input=el('input',{type,value:cur});
    input.dataset.key=k;
    grid.append(el('label',{class:'field'},lbl,input));
  });
  card.append(grid);
  const save=el('button',{class:'act'},'Save & apply');
  save.onclick=async()=>{
    save.disabled=true;
    grid.querySelectorAll('[data-key]').forEach(i=>policy.settings[i.dataset.key]=i.value);
    const r=await api('/api/policy',{method:'PUT',body:policy});
    save.disabled=false;
    toast(r&&r.ok?`Saved — ${r.files} rule files written`:'Save failed');
  };
  card.append(save);v.append(card);
}

// ---- Lists ------------------------------------------------------------------
async function renderLists(){
  const v=$('#view');v.innerHTML='';await ensurePolicy();
  const mk=(title,key,hint)=>{
    const ta=el('textarea',{spellcheck:'false'});ta.value=(policy[key]||[]).join('\n');ta.dataset.key=key;
    return el('div',{class:'card'},el('h2',{},title),el('div',{class:'muted',style:'margin-bottom:.5rem;font-size:.8rem'},hint),ta);
  };
  const row=el('div',{class:'row'});
  row.append(mk('Whitelist','whitelist','One address/pattern per line, e.g. *@partner.example'),
              mk('Blacklist','blacklist','One address/pattern per line, e.g. *@spammer.example'));
  const save=el('button',{class:'act'},'Save & apply');
  save.onclick=async()=>{
    save.disabled=true;
    v.querySelectorAll('[data-key]').forEach(ta=>policy[ta.dataset.key]=ta.value.split('\n').map(s=>s.trim()).filter(Boolean));
    const r=await api('/api/policy',{method:'PUT',body:policy});
    save.disabled=false;
    toast(r&&r.ok?`Saved — ${r.files} rule files written`:'Save failed');
  };
  v.append(row,save);
}

// ---- Messages ---------------------------------------------------------------
async function renderMessages(){
  const v=$('#view');v.innerHTML='';
  const card=el('div',{class:'card'},el('h2',{},'Recent messages'));v.append(card);
  const data=await api('/api/messages?limit=100');
  if(!data||!data.available||!data.items||!data.items.length){card.append(el('div',{class:'empty'},'No messages logged yet.'));return;}
  const t=el('table');
  t.append(el('tr',{},...['Time','From','To','Subject','Score','Status'].map(h=>el('th',{},h))));
  data.items.forEach(m=>{
    let badge='',col='var(--good)',lbl='clean';
    if(m.virus){col='var(--critical)';lbl='virus';}
    else if(m.ishighspam){col='var(--serious)';lbl='high spam';}
    else if(m.isspam){col='var(--warning)';lbl='spam';}
    badge=el('span',{class:'badge',style:'background:'+col},lbl);
    t.append(el('tr',{},
      el('td',{class:'muted'},m.ts),el('td',{},m.from),el('td',{},m.to),
      el('td',{},m.subject),el('td',{class:'num'},m.score||'0'),el('td',{},badge)));
  });
  card.append(t);
}

// ---- Rules (structured editor, no raw tabs/spaces) ---------------------------
const DIRS=['To:','From:','FromOrTo:','FromAndTo:'];
async function renderRules(){
  const v=$('#view');v.innerHTML='';
  const files=await api('/api/rules/files');
  const names=(files.files||[]).map(f=>f.name);
  if(!names.length){v.append(el('div',{class:'empty'},'Rules API unavailable.'));return;}

  const fsel=el('select');
  (files.files||[]).forEach(f=>fsel.append(el('option',{value:f.name},f.name+(f.custom?` (${f.custom} custom)`:''))));
  const adoptAll=Object.assign(el('button',{class:'act plain'},'Borrow all current rules'),
    {title:'Absorb every rule found in the live ruleset files (any whitespace style) into the custom store, normalized. Rules already generated from policy and default lines are skipped.',
     onclick:async()=>{
      if(!confirm('Borrow all rules currently in the live ruleset files?\n\nEvery rule not already generated from policy is copied into the custom store (normalized to canonical form) so it survives future syncs. Default lines are skipped — defaults come from policy.'))return;
      adoptAll.disabled=true;
      const r=await api('/api/rules/adopt',{method:'POST',body:{}});
      adoptAll.disabled=false;
      if(r&&r.ok){
        toast(`${r.adopted} rule(s) borrowed`+(r.skipped_defaults?`, ${r.skipped_defaults} default(s) skipped`:'')+(r.unparsed?`, ${r.unparsed} unparsable ignored`:''));
        renderRules();
      } else toast(r.error||'adopt failed');
     }});
  v.append(el('div',{class:'ctl'},el('span',{class:'muted'},'Ruleset:'),fsel,adoptAll));

  // Custom rules editor
  const cc=el('div',{class:'card'},el('h2',{},'Custom rules'),
    el('div',{class:'muted',style:'margin-bottom:.5rem;font-size:.8rem'},
      'Structured rules merged ahead of the generated domain rules (first match wins) — they survive every sync. Patterns are single tokens like *@domain or user@domain; the value is the action (yes, no, deliver, delete, forward addr@x delete, a spam score…). Formatting is handled for you — no tabs to get wrong.'));
  const rtable=el('table');cc.append(rtable);
  const addBtn=el('button',{class:'act plain'},'+ Add rule');
  const saveBtn=el('button',{class:'act'},'Save & apply');
  cc.append(el('div',{class:'ctl',style:'margin-top:.6rem'},addBtn,saveBtn));
  v.append(cc);

  function rowFor(r){
    const tr=el('tr',{class:'crow'});
    const dsel=el('select',{'data-f':'direction'});DIRS.forEach(d=>dsel.append(el('option',{value:d,...(d===r.direction?{selected:'selected'}:{})},d)));
    const adsel=el('select',{'data-f':'and_direction'});[['',''],...DIRS.map(d=>[d,'and '+d])].forEach(([val,lbl])=>adsel.append(el('option',{value:val,...(val===(r.and_direction||'')?{selected:'selected'}:{})},lbl)));
    tr.append(
      el('td',{},dsel),
      el('td',{},el('input',{'data-f':'pattern',value:r.pattern||'',placeholder:'*@domain.example'})),
      el('td',{},adsel),
      el('td',{},el('input',{'data-f':'and_pattern',value:r.and_pattern||'',placeholder:'(pattern)'})),
      el('td',{},el('input',{'data-f':'value',value:r.value||'',placeholder:'yes / deliver / delete …'})),
      el('td',{},Object.assign(el('button',{class:'act plain'},'✕'),{onclick:()=>tr.remove()})));
    return tr;
  }
  function drawEditor(rules){
    rtable.innerHTML='';
    rtable.append(el('tr',{},...['Direction','Pattern','','and-pattern','Value',''].map(h=>el('th',{},h))));
    rules.forEach(r=>rtable.append(rowFor(r)));
  }
  addBtn.onclick=()=>rtable.append(rowFor({direction:'To:'}));
  saveBtn.onclick=async()=>{
    const rules=[...rtable.querySelectorAll('tr.crow')].map(tr=>{
      const g=f=>tr.querySelector(`[data-f="${f}"]`).value.trim();
      return {direction:g('direction'),pattern:g('pattern'),and_direction:g('and_direction'),and_pattern:g('and_pattern'),value:g('value')};
    });
    saveBtn.disabled=true;
    const r=await api('/api/rules/custom',{method:'PUT',body:{file:fsel.value,rules}});
    saveBtn.disabled=false;
    toast(r&&r.ok?`Saved — ${r.files} rule files written, reload ${r.reloaded?'ok':'failed'}`:(r.error||'save failed'));
    if(r&&r.ok)loadLive();
  };

  // Live file view with stray detection
  const lc=el('div',{class:'card'},el('h2',{},'Live ruleset file'));v.append(lc);
  const lhead=el('div',{class:'statline'});const ltable=el('table');
  lc.append(lhead,ltable);
  async function loadLive(){
    const d=await api('/api/rules/live?file='+encodeURIComponent(fsel.value));
    lhead.innerHTML='';ltable.innerHTML='';
    if(d.error){lhead.append(el('span',{class:'muted'},d.error));return;}
    lhead.append(el('span',{class:'muted'},d.path));
    if(d.strays>0){
      lhead.append(el('span',{style:'color:var(--serious)'},`${d.strays} stray rule(s) — hand edits that the next sync will wipe`),
        Object.assign(el('button',{class:'act plain'},'Adopt strays as custom rules'),{onclick:async()=>{
          const r=await api('/api/rules/adopt',{method:'POST',body:{file:fsel.value}});
          toast(r&&r.ok?`${r.adopted} rule(s) adopted (normalized to canonical form)`:(r.error||'adopt failed'));
          load();
        }}));
    }
    if(d.unparsed>0)lhead.append(el('span',{style:'color:var(--critical)'},`${d.unparsed} unparsable line(s)`));
    ltable.append(el('tr',{},...['','Direction','Pattern','Value'].map(h=>el('th',{},h))));
    (d.lines||[]).forEach(l=>{
      if(l.kind==='comment')ltable.append(el('tr',{},el('td',{}),el('td',{class:'muted',colspan:'3'},l.text)));
      else if(l.kind==='unparsed')ltable.append(el('tr',{},
        el('td',{},el('span',{class:'badge',style:'background:var(--critical)'},'bad')),
        el('td',{class:'muted',colspan:'3',style:'font-family:ui-monospace,monospace'},l.text)));
      else ltable.append(el('tr',{},
        el('td',{},l.stray?el('span',{class:'badge',style:'background:var(--serious)'},'stray'):''),
        el('td',{},l.direction+(l.and_direction?` … and ${l.and_direction}`:'')),
        el('td',{style:'font-family:ui-monospace,monospace'},l.pattern+(l.and_pattern?`  /  ${l.and_pattern}`:'')),
        el('td',{},l.value)));
    });
  }

  async function load(){
    const d=await api('/api/rules/custom?file='+encodeURIComponent(fsel.value));
    drawEditor(d.rules||[]);
    loadLive();
  }
  fsel.onchange=load;
  load();
}

// ---- Service ----------------------------------------------------------------
async function renderService(){
  const v=$('#view');v.innerHTML='';

  // MailScanner service card
  const svc=el('div',{class:'card'},el('h2',{},'MailScanner service'));v.append(svc);
  const stat=el('div',{class:'statline'},el('span',{class:'muted'},'Loading status…'));svc.append(stat);
  const btns=el('div',{class:'ctl'});svc.append(btns);
  async function refreshStatus(){
    const s=await api('/api/service/status');
    stat.innerHTML='';
    if(s.error){stat.append(el('span',{class:'muted'},'Status unavailable'));return;}
    stat.append(
      el('span',{},el('span',{class:'dot',style:'background:'+(s.active?'var(--good)':'var(--critical)')}),
        s.active?'Running':'Stopped',s.procs?` (${s.procs} processes)`:''),
      el('span',{},el('span',{class:'dot',style:'background:'+(s.scanning?'var(--good)':'var(--warning)')}),
        'Scanning '+(s.scanning?'enabled':'disabled (mail bypasses MailScanner)')),
      el('span',{class:'muted'},`Queues: ${s.queues?.incoming??'?'} incoming · ${s.queues?.outgoing??'?'} outgoing`));
    mfBtn.textContent=s.scanning?'Disable MailScanner (mailflow)':'Enable MailScanner (mailflow)';
    mfBtn.dataset.enable=s.scanning?'false':'true';
  }
  async function ctl(action,confirmMsg){
    if(confirmMsg&&!confirm(confirmMsg))return;
    const r=await api('/api/service/control',{method:'POST',body:{action}});
    toast(r&&r.ok?`MailScanner ${action}: ok`:(r.error||`${action} failed`));
    refreshStatus();
  }
  const stopWarn='Stop the MailScanner processes?\n\nNo email will be delivered while the MailScanner processes are stopped.';
  btns.append(
    Object.assign(el('button',{class:'act'},'Start'),{onclick:()=>ctl('start')}),
    Object.assign(el('button',{class:'act danger'},'Stop'),{onclick:()=>ctl('stop',stopWarn)}),
    Object.assign(el('button',{class:'act plain'},'Reload'),{onclick:()=>ctl('reload')}),
    Object.assign(el('button',{class:'act plain'},'Restart'),{onclick:()=>ctl('restart','Restart the MailScanner processes?')}));
  const mfBtn=el('button',{class:'act plain'},'…');
  mfBtn.onclick=async()=>{
    const enable=mfBtn.dataset.enable==='true';
    if(!enable&&!confirm('Disable MailScanner?\n\nMail delivery goes back to Exim only. Any email in the MailScanner queue will not be processed until MailScanner is re-enabled.'))return;
    const r=await api('/api/service/mailflow',{method:'POST',body:{enabled:enable}});
    toast(r&&r.ok?('Scanning '+(r.scanning?'enabled':'disabled')):(r.error||'failed'));
    refreshStatus();
  };
  const syncBtn=el('button',{class:'act plain'},'Update rules now');
  syncBtn.onclick=async()=>{
    syncBtn.disabled=true;
    const r=await api('/api/service/sync',{method:'POST'});
    syncBtn.disabled=false;
    toast(r&&r.ok?`Rules updated — ${r.files} files, reload ${r.reloaded?'ok':'failed'}`:(r.error||'sync failed'));
  };
  btns.append(mfBtn,syncBtn);

  // Queue card
  const qc=el('div',{class:'card'},el('h2',{},'Mail queues'));v.append(qc);
  const qbody=el('div',{},el('span',{class:'muted'},'Checking queues…'));qc.append(qbody);
  async function refreshQueue(){
    const q=await api('/api/service/queue');
    qbody.innerHTML='';
    if(q.error){qbody.append(el('span',{class:'muted'},'Queue check unavailable'));return;}
    qbody.append(el('div',{class:'statline'},
      el('span',{},`Incoming: ${q.incoming} `,el('span',{class:'muted'},`(${q.incoming_dir})`)),
      el('span',{},`Outgoing: ${q.outgoing} `,el('span',{class:'muted'},`(${q.outgoing_dir})`)),
      el('span',{},(q.orphans||[]).length
        ? el('span',{style:'color:var(--serious)'},`${q.orphans.length} incorrectly queued file(s)`)
        : el('span',{style:'color:var(--good)'},'No incorrectly queued emails'))));
    if((q.orphans||[]).length)
      qbody.append(el('pre',{class:'log'},q.orphans.join('\n')));
  }
  const qbtns=el('div',{class:'ctl'});qc.append(qbtns);
  qbtns.append(
    Object.assign(el('button',{class:'act plain'},'Re-check'),{onclick:refreshQueue}),
    Object.assign(el('button',{class:'act'},'Fix queues & force delivery run'),{onclick:async()=>{
      if(!confirm('Move incorrectly queued files aside (kept in msfe-ng-badqueue, never deleted) and force an Exim queue run?'))return;
      const r=await api('/api/service/queue/fix',{method:'POST'});
      toast(r&&r.ok?`${r.moved} file(s) moved, delivery run ${r.flush_started?'started':'not started'}`:(r.error||'fix failed'));
      refreshQueue();
    }}));

  // Maillog card
  const lc=el('div',{class:'card'},el('h2',{},'Mail log'));v.append(lc);
  const lctl=el('div',{class:'ctl'});lc.append(lctl);
  const lsel=el('select');[100,300,1000].forEach(n=>lsel.append(el('option',{value:n},n+' lines')));
  const pre=el('pre',{class:'log'},'Loading…');
  async function refreshLog(){
    const text=await api('/api/service/maillog?lines='+lsel.value,{raw:true});
    const stick=pre.scrollTop+pre.clientHeight>=pre.scrollHeight-4;
    pre.textContent=text||'(empty)';
    if(stick)pre.scrollTop=pre.scrollHeight;
  }
  const auto=el('input',{type:'checkbox',id:'logauto'});
  auto.onchange=()=>{clearInterval(logTimer);logTimer=auto.checked?setInterval(refreshLog,5000):null;};
  lctl.append(lsel,
    Object.assign(el('button',{class:'act plain'},'Refresh'),{onclick:refreshLog}),
    auto,el('label',{for:'logauto',class:'muted'},'auto-refresh (5s)'));
  lc.append(pre);

  // User view + update card
  const uc=el('div',{class:'row'});v.append(uc);
  if(!DIRECT){
    const imp=el('div',{class:'card'},el('h2',{},'View as user'),
      el('div',{class:'muted',style:'margin-bottom:.5rem;font-size:.8rem'},'Opens the end-user settings UI for an account in a new tab (impersonated, admin-only).'));
    const uin=el('input',{placeholder:'account name'});
    imp.append(el('div',{class:'ctl'},uin,
      Object.assign(el('button',{class:'act plain'},'Open as user'),{onclick:()=>{
        const u=uin.value.trim();
        if(!/^[a-z0-9._-]+$/i.test(u)){toast('Enter a valid account name');return;}
        window.open(location.pathname.split('?')[0]+'?embedded=1&msfe_user='+encodeURIComponent(u),'_blank');
      }})));
    uc.append(imp);
  }
  const up=el('div',{class:'card'},el('h2',{},'Updates'));
  const upline=el('div',{class:'statline'},el('span',{class:'muted'},'MSFE-NG v{{VERSION}}'));
  const upBtn=el('button',{class:'act plain'},'Check for updates');
  upBtn.onclick=async()=>{
    upBtn.disabled=true;
    const r=await api('/api/service/update');
    upBtn.disabled=false;
    upline.innerHTML='';
    if(!r||!r.latest){upline.append(el('span',{class:'muted'},'Could not reach the release server.'));return;}
    if(r.latest===r.current)upline.append(el('span',{style:'color:var(--good)'},`v${r.current} — up to date`));
    else upline.append(el('span',{style:'color:var(--warning)'},`v${r.latest} available (installed v${r.current}) — `),
      el('a',{href:'https://github.com/inalto/msfe-ng/releases',target:'_blank'},'release notes'));
  };
  up.append(upline,upBtn);uc.append(up);

  refreshStatus();refreshQueue();refreshLog();
}

// ---- Config files & rulesets -------------------------------------------------
async function renderConfig(){
  const v=$('#view');v.innerHTML='';

  const ec=el('div',{class:'card'},el('h2',{},'Configuration files'),
    el('div',{class:'muted',style:'margin-bottom:.5rem;font-size:.8rem'},
      'A one-time .msfe-ng.bak backup of the original is kept next to each file. Reload MailScanner after changing MailScanner.conf.'));
  v.append(ec);
  const fsel=el('select');
  [['mailscanner','MailScanner.conf'],['msfe','MSFE-NG config.toml']].forEach(([val,lbl])=>fsel.append(el('option',{value:val},lbl)));
  const pathLbl=el('span',{class:'muted'});
  const ta=el('textarea',{spellcheck:'false',style:'min-height:22rem'});
  async function loadConf(){
    ta.value='';pathLbl.textContent='loading…';
    const r=await api('/api/service/conf?which='+fsel.value);
    if(r.error){pathLbl.textContent=r.error;return;}
    ta.value=r.content;pathLbl.textContent=r.path;
  }
  fsel.onchange=loadConf;
  const saveBtn=el('button',{class:'act'},'Save');
  saveBtn.onclick=async()=>{
    if(!confirm('Save changes to '+pathLbl.textContent+'?'))return;
    saveBtn.disabled=true;
    const r=await api('/api/service/conf',{method:'PUT',body:{which:fsel.value,content:ta.value}});
    saveBtn.disabled=false;
    if(r&&r.ok){toast(fsel.value==='mailscanner'?'Saved — reload MailScanner to apply':'Saved');}
    else toast(r.error||'save failed');
  };
  ec.append(el('div',{class:'ctl'},fsel,saveBtn,pathLbl),ta);

  const rc=el('div',{class:'card'},el('h2',{},'Generated rulesets'),
    el('div',{class:'muted',style:'margin-bottom:.5rem;font-size:.8rem'},
      'Read-only: these files are regenerated by sync — edit policy, not the files.'));
  v.append(rc);
  const list=el('div',{class:'ctl',style:'flex-wrap:wrap'});
  const rpre=el('pre',{class:'log'},'Select a ruleset file to view it.');
  rc.append(list,rpre);
  const r=await api('/api/service/rules');
  (r.files||[]).forEach(f=>{
    list.append(Object.assign(el('button',{class:'act plain'},`${f.name} (${f.size} B)`),{onclick:async()=>{
      rpre.textContent=await api('/api/service/rules/view?name='+encodeURIComponent(f.name),{raw:true});
    }}));
  });
  if(!(r.files||[]).length)list.append(el('span',{class:'muted'},'No ruleset files in '+(r.dir||'rules dir')+' yet — run sync.'));

  loadConf();
}

renderDash();
</script>
