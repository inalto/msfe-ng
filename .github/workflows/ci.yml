name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck && shellcheck packaging/*.sh
      - name: perl syntax
        run: |
          for f in panel/cpanel/whm/msfe-ng.cgi panel/cpanel/uapi/MSFE_NG.pm \
                   panel/hooks/UpcpHook.pm panel/mailscanner/MSFE_NG_Logging.pm \
                   panel/directadmin/admin/index.raw panel/directadmin/user/index.raw; do
            echo "== $f"; perl -c "$f" || exit 1
          done
